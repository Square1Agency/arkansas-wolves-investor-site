<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky: golden hour over the Arkansas River -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="35%" stop-color="#1a1320"/>
      <stop offset="62%" stop-color="#5a2a1c"/>
      <stop offset="80%" stop-color="#c47a1c"/>
      <stop offset="92%" stop-color="#e8b30b"/>
      <stop offset="100%" stop-color="#f5d36b"/>
    </linearGradient>

    <!-- Water reflection -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1320"/>
      <stop offset="40%" stop-color="#0e0a14"/>
      <stop offset="100%" stop-color="#050308"/>
    </linearGradient>

    <linearGradient id="waterGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b30b" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c47a1c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <!-- Vignette for readable foreground text -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </radialGradient>

    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#0a0a0a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#sky)"/>

  <!-- Sun glow -->
  <circle cx="1320" cy="780" r="180" fill="#f5d36b" opacity="0.35"/>
  <circle cx="1320" cy="800" r="90" fill="#fff7d6" opacity="0.5"/>

  <!-- Distant west bank treeline -->
  <path d="M 0 720 L 80 705 L 160 715 L 240 700 L 340 712 L 420 698 L 520 710 L 600 695 L 700 708 L 800 690 L 900 705 L 1000 692 L 1100 706 L 1200 690 L 1300 700 L 1400 685 L 1500 698 L 1600 690 L 1700 702 L 1800 690 L 1920 700 L 1920 760 L 0 760 Z"
        fill="#1a1015" opacity="0.75"/>

  <!-- Far skyline (downtown Little Rock — stylized Simmons Tower, Stephens, etc.) -->
  <g fill="#1a1218" opacity="0.92">
    <!-- Western cluster -->
    <rect x="220" y="640" width="36" height="100"/>
    <rect x="260" y="615" width="44" height="125"/>
    <rect x="308" y="630" width="30" height="110"/>
    <!-- Mid cluster -->
    <rect x="440" y="600" width="38" height="140"/>
    <rect x="482" y="570" width="46" height="170"/>
    <rect x="532" y="595" width="34" height="145"/>
    <!-- Stephens Inc-ish tower -->
    <rect x="600" y="540" width="56" height="200"/>
    <rect x="660" y="560" width="38" height="180"/>
    <!-- Simmons Tower (tallest in LR) -->
    <rect x="720" y="470" width="68" height="270"/>
    <polygon points="720,470 754,448 788,470"/>
    <rect x="754" y="430" width="2" height="20"/>
    <!-- Regions / Bank of America cluster -->
    <rect x="800" y="540" width="50" height="200"/>
    <rect x="854" y="560" width="42" height="180"/>
    <rect x="900" y="540" width="48" height="200"/>
    <!-- Capitol-like dome (Arkansas State Capitol silhouette to the west) -->
    <rect x="80" y="650" width="120" height="90"/>
    <ellipse cx="140" cy="650" rx="48" ry="32"/>
    <rect x="138" y="600" width="4" height="50"/>
    <!-- Eastern smaller buildings -->
    <rect x="970" y="610" width="36" height="130"/>
    <rect x="1010" y="630" width="40" height="110"/>
    <rect x="1054" y="615" width="28" height="125"/>
    <rect x="1086" y="640" width="38" height="100"/>
  </g>

  <!-- Skyline window lights -->
  <g fill="#f5d36b" opacity="0.7">
    <!-- Simmons Tower windows -->
    <rect x="730" y="490" width="3" height="3"/>
    <rect x="740" y="490" width="3" height="3"/>
    <rect x="765" y="490" width="3" height="3"/>
    <rect x="775" y="490" width="3" height="3"/>
    <rect x="730" y="510" width="3" height="3"/>
    <rect x="745" y="510" width="3" height="3"/>
    <rect x="770" y="510" width="3" height="3"/>
    <rect x="730" y="530" width="3" height="3"/>
    <rect x="755" y="530" width="3" height="3"/>
    <rect x="775" y="530" width="3" height="3"/>
    <rect x="740" y="555" width="3" height="3"/>
    <rect x="765" y="555" width="3" height="3"/>
    <rect x="730" y="580" width="3" height="3"/>
    <rect x="755" y="580" width="3" height="3"/>
    <rect x="775" y="580" width="3" height="3"/>
    <rect x="745" y="605" width="3" height="3"/>
    <rect x="770" y="605" width="3" height="3"/>
    <rect x="730" y="630" width="3" height="3"/>
    <rect x="760" y="630" width="3" height="3"/>
    <rect x="775" y="655" width="3" height="3"/>
    <rect x="740" y="680" width="3" height="3"/>
    <rect x="765" y="680" width="3" height="3"/>
    <!-- Other towers scattered -->
    <rect x="610" y="560" width="3" height="3"/>
    <rect x="630" y="580" width="3" height="3"/>
    <rect x="640" y="610" width="3" height="3"/>
    <rect x="615" y="640" width="3" height="3"/>
    <rect x="810" y="560" width="3" height="3"/>
    <rect x="830" y="590" width="3" height="3"/>
    <rect x="820" y="620" width="3" height="3"/>
    <rect x="840" y="650" width="3" height="3"/>
    <rect x="910" y="560" width="3" height="3"/>
    <rect x="930" y="590" width="3" height="3"/>
    <rect x="920" y="620" width="3" height="3"/>
    <rect x="940" y="650" width="3" height="3"/>
    <rect x="490" y="595" width="3" height="3"/>
    <rect x="510" y="625" width="3" height="3"/>
    <rect x="500" y="660" width="3" height="3"/>
    <rect x="520" y="695" width="3" height="3"/>
  </g>

  <!-- Junction Bridge — distinctive truss/lift bridge connecting NLR to LR -->
  <g stroke="#0a0810" stroke-width="2" fill="#0a0810">
    <!-- Bridge deck -->
    <rect x="1200" y="752" width="720" height="6"/>
    <!-- Vertical lift towers (Junction Bridge has two distinctive lift towers) -->
    <rect x="1380" y="640" width="14" height="115"/>
    <rect x="1700" y="640" width="14" height="115"/>
    <!-- Cross bracing on towers -->
    <line x1="1380" y1="640" x2="1394" y2="755"/>
    <line x1="1394" y1="640" x2="1380" y2="755"/>
    <line x1="1380" y1="685" x2="1394" y2="685"/>
    <line x1="1380" y1="710" x2="1394" y2="710"/>
    <line x1="1700" y1="640" x2="1714" y2="755"/>
    <line x1="1714" y1="640" x2="1700" y2="755"/>
    <line x1="1700" y1="685" x2="1714" y2="685"/>
    <line x1="1700" y1="710" x2="1714" y2="710"/>
    <!-- Top crossbeams -->
    <rect x="1376" y="636" width="22" height="6"/>
    <rect x="1696" y="636" width="22" height="6"/>
    <!-- Horizontal trusses between towers -->
    <line x1="1394" y1="660" x2="1700" y2="660" stroke-width="2"/>
    <!-- Truss diagonals across the lift span -->
    <g stroke-width="1.5">
      <line x1="1394" y1="752" x2="1424" y2="660"/>
      <line x1="1454" y1="752" x2="1424" y2="660"/>
      <line x1="1454" y1="752" x2="1484" y2="660"/>
      <line x1="1514" y1="752" x2="1484" y2="660"/>
      <line x1="1514" y1="752" x2="1544" y2="660"/>
      <line x1="1574" y1="752" x2="1544" y2="660"/>
      <line x1="1574" y1="752" x2="1604" y2="660"/>
      <line x1="1634" y1="752" x2="1604" y2="660"/>
      <line x1="1634" y1="752" x2="1664" y2="660"/>
      <line x1="1700" y1="752" x2="1664" y2="660"/>
    </g>
    <!-- Approach pylons -->
    <rect x="1240" y="720" width="6" height="38"/>
    <rect x="1290" y="715" width="6" height="43"/>
    <rect x="1340" y="710" width="6" height="48"/>
    <rect x="1750" y="710" width="6" height="48"/>
    <rect x="1800" y="715" width="6" height="43"/>
    <rect x="1850" y="720" width="6" height="38"/>
  </g>

  <!-- River bank in the foreground -->
  <path d="M 0 760 L 1920 760 L 1920 780 L 0 780 Z" fill="#0c0a10"/>

  <!-- Water -->
  <rect x="0" y="780" width="1920" height="300" fill="url(#water)"/>

  <!-- Sun reflection on water -->
  <ellipse cx="1320" cy="820" rx="160" ry="14" fill="url(#waterGlow)"/>
  <ellipse cx="1320" cy="850" rx="120" ry="10" fill="#e8b30b" opacity="0.25"/>
  <ellipse cx="1320" cy="880" rx="90" ry="7" fill="#e8b30b" opacity="0.15"/>

  <!-- Skyline reflection (subtle) -->
  <g fill="#1a1218" opacity="0.35" transform="translate(0, 1520) scale(1, -1)">
    <rect x="720" y="470" width="68" height="270"/>
    <rect x="600" y="540" width="56" height="200"/>
    <rect x="800" y="540" width="50" height="200"/>
    <rect x="900" y="540" width="48" height="200"/>
  </g>

  <!-- River ripple lines -->
  <g stroke="#e8b30b" stroke-width="0.6" opacity="0.1">
    <line x1="200" y1="900" x2="350" y2="900"/>
    <line x1="500" y1="940" x2="680" y2="940"/>
    <line x1="900" y1="980" x2="1100" y2="980"/>
    <line x1="1400" y1="930" x2="1600" y2="930"/>
    <line x1="100" y1="1020" x2="280" y2="1020"/>
    <line x1="1700" y1="1010" x2="1900" y2="1010"/>
  </g>

  <!-- Vignette overlay for text readability -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#leftFade)"/>
</svg>
