<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="60%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b30b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e8b30b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#e8b30b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e8b30b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>

  <!-- Little Rock skyline silhouette — subtle, dark on dark -->
  <g fill="#0a0a0a" opacity="0.95">
    <rect x="60" y="490" width="50" height="180"/>
    <rect x="115" y="450" width="40" height="220"/>
    <rect x="160" y="420" width="55" height="250"/>
    <ellipse cx="187" cy="420" rx="30" ry="18"/>
    <rect x="185" y="380" width="4" height="40"/>
    <rect x="230" y="440" width="45" height="230"/>
    <rect x="285" y="400" width="60" height="270"/>
    <polygon points="285,400 315,375 345,400"/>
    <rect x="355" y="430" width="50" height="240"/>
    <rect x="415" y="460" width="42" height="210"/>
    <rect x="465" y="440" width="38" height="230"/>
    <rect x="510" y="480" width="35" height="190"/>
  </g>

  <!-- Skyline window lights (very sparse gold pinpricks) -->
  <g fill="#e8b30b" opacity="0.6">
    <rect x="130" y="480" width="3" height="3"/>
    <rect x="140" y="510" width="3" height="3"/>
    <rect x="180" y="470" width="3" height="3"/>
    <rect x="195" y="500" width="3" height="3"/>
    <rect x="180" y="540" width="3" height="3"/>
    <rect x="250" y="480" width="3" height="3"/>
    <rect x="260" y="520" width="3" height="3"/>
    <rect x="245" y="560" width="3" height="3"/>
    <rect x="305" y="440" width="3" height="3"/>
    <rect x="320" y="470" width="3" height="3"/>
    <rect x="310" y="510" width="3" height="3"/>
    <rect x="325" y="550" width="3" height="3"/>
    <rect x="305" y="590" width="3" height="3"/>
    <rect x="330" y="620" width="3" height="3"/>
    <rect x="370" y="470" width="3" height="3"/>
    <rect x="385" y="510" width="3" height="3"/>
    <rect x="375" y="560" width="3" height="3"/>
    <rect x="430" y="490" width="3" height="3"/>
    <rect x="445" y="540" width="3" height="3"/>
    <rect x="480" y="470" width="3" height="3"/>
    <rect x="490" y="520" width="3" height="3"/>
    <rect x="475" y="590" width="3" height="3"/>
    <rect x="520" y="510" width="3" height="3"/>
    <rect x="530" y="560" width="3" height="3"/>
  </g>

  <!-- Ground shadow -->
  <rect x="0" y="670" width="600" height="130" fill="#080808"/>

  <!-- Bottom fade gradient -->
  <rect x="0" y="500" width="600" height="200" fill="url(#goldFade)"/>

  <!-- Eyebrow accent line and label — the intentional design signal -->
  <line x1="240" y1="240" x2="360" y2="240" stroke="#e8b30b" stroke-width="1"/>
  <text x="300" y="285"
        fill="#e8b30b"
        font-family="'Bebas Neue', Impact, sans-serif"
        font-size="42"
        letter-spacing="5"
        text-anchor="middle">LITTLE ROCK</text>
  <line x1="240" y1="315" x2="360" y2="315" stroke="#e8b30b" stroke-width="1"/>

  <text x="300" y="345"
        fill="#8a8a8a"
        font-family="Inter, Arial, sans-serif"
        font-size="12"
        letter-spacing="4"
        text-anchor="middle">ADVISORY COUNCIL</text>

  <text x="300" y="370"
        fill="#8a8a8a"
        font-family="Inter, Arial, sans-serif"
        font-size="10"
        letter-spacing="3"
        text-anchor="middle" opacity="0.6">TO BE ANNOUNCED</text>
</svg>
